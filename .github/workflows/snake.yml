# Save this file as: .github/workflows/snake.yml  (in your vermilion4/vermilion4 repo)
# Then go to the repo's Actions tab and run "Generate snake animation" once manually.
# It regenerates daily after that.

name: Generate snake animation

on:
  schedule:
    - cron: "0 0 * * *"   # every day at midnight
  workflow_dispatch:        # allows manual trigger
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: vermilion4
          outputs: |
            dist/github-snake.svg?color_snake=#800000&color_dots=#f5e0e0,#e8a3a3,#d15c5c,#a52a2a,#800000
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#C1121F&color_dots=#1a1a1a,#5c1a1a,#8a1f1f,#a81d1d,#C1121F

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}